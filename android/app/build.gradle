apply plugin: 'com.android.application'
apply plugin: 'kotlin-android' // ADDED for Health Connect plugin (Kotlin)

android {
    namespace = "com.varun.ignyt"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.varun.ignyt"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
    // ADDED for Health Connect (requires Java 17+ bytecode target)
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }
    kotlinOptions {
        jvmTarget = "21"
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')

    // ADDED for Health Connect — official AndroidX SDK only, no third-party wrapper.
    // Check https://developer.android.com/jetpack/androidx/releases/health-connect for anything
    // newer before building; this was the current documented version at integration time.
    implementation "androidx.health.connect:connect-client:1.1.0"
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3"

    // ADDED for IGNYT account (Google Sign-In + Firebase Authentication).
    // Versions deliberately from the Kotlin 1.9-era compatibility set (this project pins
    // kotlin_version 1.9.24): newer androidx.credentials/Firebase releases ship Kotlin 2.x
    // metadata the 1.9 compiler can't read. Do not bump these without also revisiting
    // kotlin_version in android/build.gradle.
    // The app builds and runs WITHOUT google-services.json (sign-in then reports "not
    // configured" cleanly); drop the file from Firebase Console into android/app/ to enable it.
    implementation platform("com.google.firebase:firebase-bom:33.7.0")
    implementation "com.google.firebase:firebase-auth"
    implementation "androidx.credentials:credentials:1.3.0"
    implementation "androidx.credentials:credentials-play-services-auth:1.3.0"
    implementation "com.google.android.libraries.identity.googleid:googleid:1.1.1"
    // Task.await() bridge used by AuthPlugin; same version line as coroutines-android above.
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-play-services:1.7.3"
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
